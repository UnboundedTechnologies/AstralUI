<!doctype html>
<html lang="en" data-astral-scheme="dark" style="color-scheme:dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AstralUI - Live playground</title>
<meta name="description" content="Live, interactive playground rendering the real @astralui/core React components - native interactions and animations." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%236741d9'/%3E%3Cpath d='M16 6l3 7 7 3-7 3-3 7-3-7-7-3 7-3z' fill='white'/%3E%3C/svg%3E" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@astralui/core@0.1.7/dist/styles.css" />
<style>
  body { background: var(--astral-color-body); color: var(--astral-color-text); margin: 0; }
  .pg-top { position: sticky; top: 0; z-index: 50; display: flex; align-items: center; gap: 14px; height: 56px; padding: 0 22px;
    background: color-mix(in srgb, var(--astral-color-body) 82%, transparent); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--astral-color-default-border); }
  .pg-top .b { display: flex; align-items: center; gap: 9px; font-weight: 800; letter-spacing: -.02em; text-decoration: none; color: inherit; }
  .pg-top .b .m { width: 25px; height: 25px; border-radius: 7px; display: grid; place-items: center; background: var(--astral-primary-color-filled); color: #fff; }
  .pg-top .b .m svg { width: 15px; height: 15px; }
  .pg-top .sp { margin-left: auto; }
  .pg-top a.lk { font-size: 13px; font-weight: 600; color: var(--astral-color-dimmed); text-decoration: none; padding: 7px 10px; border-radius: 8px; }
  .pg-top a.lk:hover { color: var(--astral-color-text); background: color-mix(in srgb, var(--astral-color-dimmed) 12%, transparent); }
  .pg-wrap { max-width: 1120px; margin: 0 auto; padding: 30px 22px 90px; }
  .pg-h1 { font-size: 32px; letter-spacing: -.03em; margin: 0 0 6px; }
  .pg-lead { color: var(--astral-color-dimmed); font-size: 16px; line-height: 1.6; max-width: 70ch; margin: 0 0 8px; }
  .pg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-top: 26px; align-items: start; }
  .pg-card { background: var(--astral-app-card, color-mix(in srgb, var(--astral-color-dimmed) 7%, transparent));
    border: 1px solid var(--astral-color-default-border); border-radius: 16px; padding: 18px; }
  .pg-card h3 { margin: 0 0 14px; font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--astral-color-dimmed); }
  .pg-card.wide { grid-column: 1 / -1; }
  .pg-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .pg-fallback { margin-top: 26px; padding: 18px; border: 1px solid var(--astral-color-default-border); border-radius: 14px; color: var(--astral-color-dimmed); }
  .pg-swatch { width: 24px; height: 24px; border-radius: 7px; cursor: pointer; border: 2px solid transparent; }
  .pg-swatch[aria-pressed="true"] { border-color: var(--astral-color-text); }
</style>
</head>
<body>
<header class="pg-top">
  <a class="b" href="./index.html"><span class="m"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 6.1L20.5 10l-6.1 2.4L12 18l-2.4-5.6L3.5 10l6.1-1.9z"/></svg></span>AstralUI</a>
  <span class="sp"></span>
  <a class="lk" href="./index.html">Home</a>
  <a class="lk" href="./docs.html">Docs</a>
  <a class="lk" href="https://www.npmjs.com/package/@astralui/core" target="_blank" rel="noopener">npm</a>
</header>

<div class="pg-wrap">
  <h1 class="pg-h1">Live playground</h1>
  <p class="pg-lead">Every component below is the <strong>real</strong> <code>@astralui/core</code> React component, rendered live - native interactions (hover, focus, open/close) and animations included. Flip the theme or recolor the brand and watch it all respond.</p>
  <div id="pg-root"><div class="pg-fallback" id="pg-loading"><span class="au-spinner"></span> &nbsp;Loading the live components…</div></div>
  <div id="pg-fallback" class="pg-fallback" style="display:none"></div>
</div>

<script type="module" src="./playground.app.js"></script>
</body>
</html>
