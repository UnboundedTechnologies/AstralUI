name: Publish

# Publishes @astralui/core to npm when you publish a GitHub Release (tag v*).
# Uses npm Trusted Publishing (OIDC) - no token/secret required.
# One-time setup on npmjs.com: package -> Settings -> Trusted Publisher ->
#   GitHub Actions, repo UnboundedTechnologies/AstralUI, workflow publish.yml.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest # ensure OIDC-capable npm (>= 11.5.1)
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Publish to npm (skip if this version already exists)
        # No NODE_AUTH_TOKEN: Trusted Publishing exchanges a short-lived OIDC
        # token automatically, and stamps the package with build provenance.
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@astralui/core@$VERSION" version >/dev/null 2>&1; then
            echo "@astralui/core@$VERSION is already published - skipping."
          else
            npm publish --access public
          fi
